<html lang="en">

<head>
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

                <tr>
                    <th>Email</th>
                    <td>{{ user[2] }}</td>
                </tr>

            </table>

            <a href="/dashboard" class="btn btn-primary">
                Back
            </a>

        </div>

    </div>

</div>

</body>
</html>
